<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz</title>
  <link rel="stylesheet" href="styles.css" />
  <!--
    GitHub Pages: Settings → Pages → Build and deployment → Branch → folder /
    (or /docs if you move these files). Use relative asset paths (questions.tsv, styles.css, app.js).
    Last TSV row: put the treasure location in "question" and leave "answer" empty (tab after location).
  -->
</head>
<body>
  <div id="celebration" class="celebration" aria-hidden="true"></div>
  <div id="finale-overlay" class="finale-overlay" aria-hidden="true" hidden></div>

  <main class="main">
    <div class="quiz-meta">
      <p id="status" class="status" role="status"></p>
      <button type="button" id="reset-progress" class="reset-btn" hidden>
        Start over
      </button>
    </div>
    <div id="progress-bar-wrap" class="progress-bar-wrap" hidden>
      <div
        id="progress-track"
        class="progress-track"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-valuetext=""
      >
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
    <h1 id="question" class="question">Loading…</h1>

    <form id="quiz-form" class="form" autocomplete="off">
      <label class="label" for="answer">Your answer</label>
      <div class="row">
        <input
          id="answer"
          class="input"
          type="text"
          name="answer"
          inputmode="text"
          autocapitalize="sentences"
          spellcheck="true"
        />
        <button type="submit" class="submit">Check</button>
      </div>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
